<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC - Didática</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; }
        .container { max-width: 500px; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="container bg-white p-4 rounded shadow">
        <h2 class="text-center mb-4 text-primary">Calculadora de IMC</h2>
        
        <div class="mb-3">
            <label for="peso" class="form-label">Seu Peso (kg):</label>
            <input type="number" id="peso" class="form-control" placeholder="Ex: 75.5">
        </div>

        <div class="mb-3">
            <label for="altura" class="form-label">Sua Altura (m):</label>
            <input type="number" id="altura" class="form-control" placeholder="Ex: 1.75">
        </div>

        <button id="btnCalcular" class="btn btn-primary w-100">Calcular IMC</button>

        <div id="resultado" class="mt-4 text-center fs-5">
            <!-- Resultado aparecerá aqui -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
