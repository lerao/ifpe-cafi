<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Média - Didática</title>
    <!-- Importando Bootstrap 5 via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 500px; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="container bg-white p-4 rounded shadow">
        <h2 class="text-center mb-4">Calculadora de Média</h2>
        
        <div class="mb-3">
            <label for="nota1" class="form-label">Primeira Nota:</label>
            <input type="number" id="nota1" class="form-control" placeholder="Digite a nota 1">
        </div>

        <div class="mb-3">
            <label for="nota2" class="form-label">Segunda Nota:</label>
            <input type="number" id="nota2" class="form-control" placeholder="Digite a nota 2">
        </div>

        <button id="btnCalcular" class="btn btn-primary w-100">Calcular Média</button>

        <div id="resultado" class="mt-4 text-center fs-4 fw-bold">
            <!-- O resultado aparecerá aqui -->
        </div>
    </div>

    <!-- Script JavaScript -->
    <script src="app.js"></script>
</body>
</html>
