<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semáforo Inteligente - Didática</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5 text-center">
        <h1 class="mb-4">Controle de Semáforo</h1>
        
        <div class="mb-4">
            <img src="img/desligado.png" alt="Semáforo" id="imgSemaforo" class="img-fluid" style="max-width: 200px;">
        </div>

        <div class="d-flex justify-content-center gap-2 mb-4">
            <button id="vermelho" class="btn btn-danger px-4">Vermelho</button>
            <button id="amarelo" class="btn btn-warning px-4">Amarelo</button>
            <button id="verde" class="btn btn-success px-4">Verde</button>
            <button id="automatico" class="btn btn-primary px-4">Automático</button>
        </div>

        <div id="status" class="badge bg-secondary p-2 fs-6">
            Modo: Manual
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
