<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista de Tarefas - Didática</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .concluida { text-decoration: line-through; color: #6c757d; }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0"><i class="bi bi-journal-check"></i> Lista de Tarefas</h3>
            </div>
            <div class="card-body">
                <div class="input-group mb-3">
                    <input type="text" id="inputTarefa" class="form-control" placeholder="O que você precisa fazer?">
                    <button class="btn btn-primary" id="btnAdicionar">Adicionar</button>
                </div>

                <ul id="listaTarefas" class="list-group">
                    <!-- Tarefas entrarão aqui -->
                </ul>
            </div>
            <div class="card-footer text-muted small text-center">
                Clique na tarefa para marcar como pronta ou no X para excluir.
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
