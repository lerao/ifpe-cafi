<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Desconto - Didática</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 450px;">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3 class="text-center mb-0">Calculadora de Desconto</h3>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="valorOriginal" class="form-label">Preço Original (R$):</label>
                    <input type="number" id="valorOriginal" class="form-control" placeholder="Ex: 100.00">
                </div>
                <div class="mb-3">
                    <label for="porcentagemDesconto" class="form-label">Desconto (%):</label>
                    <input type="number" id="porcentagemDesconto" class="form-control" placeholder="Ex: 10">
                </div>
                <button id="btnCalcular" class="btn btn-success w-100">Calcular Valor Final</button>
            </div>
            <div class="card-footer text-center">
                <div id="resultado" class="fs-5 fw-bold text-success">
                    O resultado aparecerá aqui
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
