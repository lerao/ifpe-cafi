<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Didático</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #valor { font-size: 6rem; transition: color 0.3s; }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="text-center p-5 bg-white rounded-circle shadow-lg" style="width: 400px; height: 400px;">
        <h3 class="text-muted">Contador</h3>
        <div id="valor" class="fw-bold my-3">0</div>
        
        <div class="d-flex justify-content-center gap-2">
            <button id="btnDiminuir" class="btn btn-outline-danger btn-lg"> - </button>
            <button id="btnReset" class="btn btn-outline-secondary btn-lg"> Reset </button>
            <button id="btnAumentar" class="btn btn-outline-success btn-lg"> + </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
