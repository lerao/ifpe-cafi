<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Tabuada - Didática</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 400px;">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h3>Gerador de Tabuada</h3>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="numero" class="form-label">Digite um número:</label>
                    <input type="number" id="numero" class="form-control" placeholder="Ex: 7">
                </div>
                <button id="btnGerar" class="btn btn-primary w-100">Gerar Tabuada</button>
            </div>
        </div>

        <div class="mt-4 shadow rounded bg-white p-3">
            <ul id="listaTabuada" class="list-group list-group-flush text-center fs-5">
                <!-- A tabuada aparecerá aqui -->
                <li class="list-group-item text-muted">Aguardando número...</li>
            </ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
