<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Aptidão Física - Didática</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

    <div class="container mt-5" style="max-width: 500px;">
        <div class="bg-secondary p-4 rounded shadow">
            <h2 class="text-center mb-4">Teste de Corrida (100m)</h2>
            <p class="text-center">Para ser aprovado, o tempo deve ser <strong>menor ou igual a 15 segundos</strong>.</p>
            
            <div class="mb-3">
                <label for="tempo" class="form-label text-light">Seu Tempo (segundos):</label>
                <input type="number" id="tempo" class="form-control bg-light" placeholder="Ex: 14.2">
            </div>

            <button id="btnAvaliar" class="btn btn-warning w-100 fw-bold">Avaliar Desempenho</button>

            <div id="resultado" class="mt-4 text-center fs-3">
                <!-- Resultado aparecerá aqui -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
