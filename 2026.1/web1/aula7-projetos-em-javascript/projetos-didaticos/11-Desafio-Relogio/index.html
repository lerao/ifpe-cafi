<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio: Meu Relógio Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #1a1a1a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #relogio { font-size: 5rem; font-family: 'Courier New', Courier, monospace; color: #00ff00; text-shadow: 0 0 20px #00ff00; }
        .card { background-color: #2d2d2d; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="container" style="max-width: 500px;">
        <div class="card shadow-lg text-center p-4">
            <h2 class="mb-4 text-info">Relógio Digital</h2>
            
            <!-- O RELÓGIO -->
            <div id="relogio" class="mb-4">00:00:00</div>

            <!-- ÁREA DO ALARME -->
            <div class="mt-3 p-3 bg-dark rounded">
                <label class="form-label text-light">Definir Alarme:</label>
                <div class="input-group">
                    <input type="time" id="inputAlarme" class="form-control bg-secondary text-white border-0">
                    <button id="btnDefinir" class="btn btn-info">Definir</button>
                </div>
                <div id="statusAlarme" class="mt-2 small text-warning">Alarme desligado</div>
            </div>
        </div>
    </div>

    <!-- Áudio de exemplo para o alarme -->
    <audio id="somAlarme" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script src="app.js"></script>
</body>
</html>
