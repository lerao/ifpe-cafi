<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step-by-Step Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header">
                    <h3>Cadastro de Usuário</h3>
                </div>

                <div class="card-body">

                    <!-- Barra de progresso -->
                    <div class="progress mb-4">
                        <div id="progressBar"
                             class="progress-bar"
                             role="progressbar"
                             style="width: 33%;">
                            Etapa 1 de 3
                        </div>
                    </div>

                    <form id="formCadastro">

                        <!-- STEP 1 -->
                        <div class="step">

                            <h4 class="mb-3">Dados Pessoais</h4>

                            <div class="mb-3">
                                <label class="form-label">
                                    Nome Completo
                                </label>

                                <input type="text"
                                       id="nome"
                                       class="form-control"
                                       required>

                                <div class="invalid-feedback">
                                    Informe seu nome.
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">
                                    E-mail
                                </label>

                                <input type="email"
                                       id="email"
                                       class="form-control"
                                       required>

                                <div class="invalid-feedback">
                                    Informe um e-mail válido.
                                </div>
                            </div>

                            <button type="button"
                                    class="btn btn-primary next-btn">
                                Próximo
                            </button>

                        </div>

                        <!-- STEP 2 -->
                        <div class="step d-none">

                            <h4 class="mb-3">Endereço</h4>

                            <div class="mb-3">
                                <label class="form-label">
                                    Cidade
                                </label>

                                <input type="text"
                                       id="cidade"
                                       class="form-control"
                                       required>

                                <div class="invalid-feedback">
                                    Informe a cidade.
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">
                                    Estado
                                </label>

                                <input type="text"
                                       id="estado"
                                       class="form-control"
                                       required>

                                <div class="invalid-feedback">
                                    Informe o estado.
                                </div>
                            </div>

                            <button type="button"
                                    class="btn btn-secondary prev-btn">
                                Voltar
                            </button>

                            <button type="button"
                                    class="btn btn-primary next-btn">
                                Próximo
                            </button>

                        </div>

                        <!-- STEP 3 -->
                        <div class="step d-none">

                            <h4 class="mb-3">Segurança</h4>

                            <div class="mb-3">
                                <label class="form-label">
                                    Senha
                                </label>

                                <input type="password"
                                       id="senha"
                                       class="form-control"
                                       minlength="6"
                                       required>

                                <div class="invalid-feedback">
                                    A senha deve possuir no mínimo 6 caracteres.
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">
                                    Confirmar Senha
                                </label>

                                <input type="password"
                                       id="confirmarSenha"
                                       class="form-control"
                                       required>

                                <div class="invalid-feedback">
                                    As senhas devem ser iguais.
                                </div>
                            </div>

                            <button type="button"
                                    class="btn btn-secondary prev-btn">
                                Voltar
                            </button>

                            <button type="submit"
                                    class="btn btn-success">
                                Finalizar Cadastro
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="validacao.js"></script>

</body>

</html>
