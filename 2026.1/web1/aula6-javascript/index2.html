<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Switch Case</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="mb-4">Exemplo de Switch Case</h2>

        <label class="form-label">
            Digite um número de 1 a 7:
        </label>

        <input type="number" id="numero" class="form-control">

        <button class="btn btn-primary mt-3" id="verificar">
            Verificar Dia
        </button>

        <div id="resultado" class="mt-4 fs-4"></div>

    </div>

</div>

<script src="script.js"></script>

<script>
    const botao = document.getElementById("verificar");

botao.addEventListener("click", () => {

    const numero = Number(document.getElementById("numero").value);

    const resultado = document.getElementById("resultado");

    switch(numero){

        case 1:
            resultado.textContent = "Domingo";
            break;

        case 2:
            resultado.textContent = "Segunda-feira";
            break;

        case 3:
            resultado.textContent = "Terça-feira";
            break;

        case 4:
            resultado.textContent = "Quarta-feira";
            break;

        case 5:
            resultado.textContent = "Quinta-feira";
            break;

        case 6:
            resultado.textContent = "Sexta-feira";
            break;

        case 7:
            resultado.textContent = "Sábado";
            break;

        default:
            resultado.textContent = "Número inválido!";
    }

});
</script>
</body>
</html>
